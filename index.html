<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f8f2ea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/styles.css" />
  <title>PawTrail</title>
</head>

<body data-mood="CALM">
  <button class="debug-toggle" type="button" onclick="toggleDebug()">🧪</button>

  <main id="home" class="screen active">
    <section class="card">
      <div id="homePuppy" class="puppy">🐶</div>
      <h1>PawTrail</h1>
      <p id="homeStatus">Your puppy is resting.</p>
      <p id="homeMeta">No walks yet.</p>
      <button class="primary" type="button" onclick="startWalk()">Start Walk</button>
    </section>
  </main>

  <main id="walk" class="screen">
    <section class="card">
      <div id="walkPuppy" class="puppy walking">🐶</div>
      <h2>Walking...</h2>
      <p id="walkStatus">Ready to go.</p>
      <p id="walkMeta">Steps: 0 • Distance: 0.00 km</p>
      <div class="actions">
        <button class="secondary" type="button" onclick="addStep()">Step</button>
        <button class="primary" type="button" onclick="endWalk()">End Walk</button>
      </div>
    </section>
  </main>

  <aside id="debugPanel" class="debug hidden">
    <h3>🧪 Debug Panel</h3>
    <div id="debugContent">Loading...</div>
    <button class="secondary full" type="button" onclick="toggleDebug()">Close</button>
  </aside>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
